name: Beta feedback / friction report
description: Nothing crashed, but something was slow, confusing, missing, or ate more than 15 minutes of your time.
title: "[feedback]: "
labels: ["feedback", "beta-feedback"]
body:
  - type: markdown
    attributes:
      value: |
        The 15-minute rule: if anything took you more than 15 minutes — including giving up — that's exactly the data we want. "I gave up" is a valid and valuable report.
  - type: dropdown
    id: area
    attributes:
      label: Which area?
      options:
        - Install / first run
        - VM creation
        - Boot / lifecycle (start, stop, pause, resume)
        - Snapshots / snapshot tree
        - CLI ergonomics / scripting
        - Docs / tester guide
        - GUI alpha
        - Other
    validations:
      required: true
  - type: textarea
    id: friction
    attributes:
      label: What were you trying to do, and where did it get slow, confusing, or stuck?
    validations:
      required: true
  - type: textarea
    id: expectation
    attributes:
      label: What would have made this take under a minute?
      description: Describe the behavior you expected — compare to another tool (VMware, virt-manager, UTM, Parallels) if that helps.
  - type: input
    id: time-lost
    attributes:
      label: Roughly how much time did this cost you?
      placeholder: "e.g. 20 minutes, gave up after an hour"
