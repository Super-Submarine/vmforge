name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Format check
        run: cargo fmt --all --check
      - name: Lint (clippy, deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Build
        run: cargo build --workspace --all-targets
      - name: Test
        run: cargo test --workspace
      - name: Failure-injection tests (error taxonomy)
        run: cargo test -p vmforge-cli --test failure_injection -- --nocapture

  hygiene:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: No committed build artifacts
        run: |
          bad=$(git ls-files | grep -E '(^|/)(__pycache__/|target/)|\.pyc$|\.egg-info(/|$)' || true)
          if [ -n "$bad" ]; then
            echo "Committed build artifacts found:"; echo "$bad"; exit 1
          fi
