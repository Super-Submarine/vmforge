name: storage

on:
  push:
    branches: [main]
    paths: ["storage/**", ".github/workflows/storage.yml"]
  pull_request:
    paths: ["storage/**", ".github/workflows/storage.yml"]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: storage
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install qemu-utils (no KVM needed)
        run: sudo apt-get update && sudo apt-get install -y qemu-utils
      - name: Install package
        run: pip install -e .[dev]
      - name: Lint
        run: ruff check .
      - name: Tests
        run: pytest -v
